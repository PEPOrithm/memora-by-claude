const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const todayISO = () => new Date().toISOString().slice(0, 10);
const addDays = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
const isDue = (card) => card.dueDate <= todayISO();
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------------------------------------------------------------------------
// SM-2 — quality: 1 Again, 3 Hard, 4 Good, 5 Easy
// ---------------------------------------------------------------------------
function sm2(card, quality) {
  let { ease = 2.5, interval = 0, reps = 0, lapses = 0 } = card;
  if (quality < 3) { reps = 0; interval = 1; lapses += 1; }
  else {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ease);
    reps += 1;
  }
  ease = Math.max(1.3, Math.round((ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02))) * 100) / 100);
  return { ease, interval, reps, lapses, dueDate: addDays(todayISO(), interval), lastReviewed: todayISO() };
}
function grades(t) {
  return [
    { label: t.gradeAgain, quality: 1, key: "1" }, { label: t.gradeHard, quality: 3, key: "2" },
    { label: t.gradeGood, quality: 4, key: "3" }, { label: t.gradeEasy, quality: 5, key: "4" },
  ];
}

// ---------------------------------------------------------------------------
// Local persistence (localStorage — this is a standalone deployment, not a
// Claude artifact, so there is no window.storage API here)
// ---------------------------------------------------------------------------
const DATA_KEY = "memora-data";
const KEY_KEY = "memora-api-key";
const DEFAULT_DATA = { decks: [], cards: [], reviewLog: [], theme: "light", lang: "ja", aiChat: [] };

function loadData() {
  try {
    const raw = localStorage.getItem(DATA_KEY);
    return raw ? { ...DEFAULT_DATA, ...JSON.parse(raw) } : DEFAULT_DATA;
  } catch { return DEFAULT_DATA; }
}
function saveData(data) {
  try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch {}
}
function loadApiKey() {
  try { return localStorage.getItem(KEY_KEY) || ""; } catch { return ""; }
}
function saveApiKey(key) {
  try { localStorage.setItem(KEY_KEY, key); } catch {}
}

// ---------------------------------------------------------------------------
// Anthropic API — direct browser call using the user's own key
// ---------------------------------------------------------------------------
async function askClaude(apiKey, messages, system) {
  if (!apiKey) throw new Error("no_key");
  let res;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({ model: "claude-sonnet-5", max_tokens: 1000, system, messages }),
    });
  } catch (e) { console.error("Memora network error", e); throw new Error("network"); }
  let json;
  try { json = await res.json(); } catch (e) { throw new Error("parse"); }
  if (!res.ok || json?.type === "error") { console.error("Memora API error", json); throw new Error(json?.error?.message || `http_${res.status}`); }
  const text = (json.content || []).map((b) => (b.type === "text" ? b.text : "")).join("\n").trim();
  if (!text) throw new Error("empty");
  return text;
}

// ---------------------------------------------------------------------------
// Visual signature
// ---------------------------------------------------------------------------
function Lantern({ ease = 2.5, dueRatio = 0, size = 34, c }) {
  const strength = Math.max(0, Math.min(1, (ease - 1.3) / (2.8 - 1.3)));
  const glow = 6 + strength * 14;
  const core = dueRatio > 0 ? c.danger : c.gold;
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", position: "relative", flexShrink: 0,
      background: `radial-gradient(circle at 35% 30%, ${core}, ${core}00 70%)`,
      boxShadow: `0 0 ${glow}px ${core}${dueRatio > 0 ? "aa" : "77"}`, border: `1px solid ${core}55` }}>
      {dueRatio > 0 && <div style={{ position: "absolute", inset: -4, borderRadius: "50%", border: `2px solid ${c.danger}`, opacity: .55 }} />}
    </div>
  );
}

function SimpleBarChart({ c, data }) {
  const max = Math.max(1, ...data.map((d) => d.value));
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 180 }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, height: "100%", justifyContent: "flex-end" }}>
          <div title={String(d.value)} style={{
            width: "100%", maxWidth: 22, borderRadius: "4px 4px 0 0",
            height: `${(d.value / max) * 130}px`, minHeight: d.value > 0 ? 3 : 0,
            background: d.value > 0 ? c.teal : c.bgSunken, transition: "height .3s ease",
          }} />
          <span className="memora-mono" style={{ fontSize: 9.5, color: c.inkFaint }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

  const [data, setDataState] = useState(loadData);
  const [apiKey, setApiKey] = useState(loadApiKey);
  const [themeMode, setThemeMode] = useState(data.theme || "light");
  const [lang, setLang] = useState(data.lang || "ja");
  const [view, setView] = useState({ kind: "decks" });
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [desktopCollapsed, setDesktopCollapsed] = useState(false);
  const [aiOpen, setAiOpen] = useState(false);

  useEffect(() => {
    function onResize() { setIsMobile(window.innerWidth <= 768); }
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    if (!isMobile) return;
    let startX = null, startY = null, tracking = false;
    function onTouchStart(e) {
      const touch = e.touches[0];
      startX = touch.clientX; startY = touch.clientY;
      tracking = sidebarOpen || startX <= 24;
    }
    function onTouchMove(e) {
      if (!tracking || startX === null) return;
      const touch = e.touches[0];
      const dx = touch.clientX - startX, dy = touch.clientY - startY;
      if (Math.abs(dy) > Math.abs(dx)) return;
      if (!sidebarOpen && dx > 60) { setSidebarOpen(true); tracking = false; }
      if (sidebarOpen && dx < -60) { setSidebarOpen(false); tracking = false; }
    }
    function onTouchEnd() { startX = null; startY = null; tracking = false; }
    window.addEventListener("touchstart", onTouchStart, { passive: true });
    window.addEventListener("touchmove", onTouchMove, { passive: true });
    window.addEventListener("touchend", onTouchEnd, { passive: true });
    return () => {
      window.removeEventListener("touchstart", onTouchStart);
      window.removeEventListener("touchmove", onTouchMove);
      window.removeEventListener("touchend", onTouchEnd);
    };
  }, [isMobile, sidebarOpen]);

  const c = THEME[themeMode];
  const t = STRINGS[lang];

  function persist(next) { setDataState(next); saveData(next); }
  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 2200); }

  const decks = data.decks, cards = data.cards;
  const dueCountForDeck = (id) => cards.filter((cd) => cd.deckId === id && isDue(cd)).length;
  const avgEaseForDeck = (id) => {
    const dc = cards.filter((cd) => cd.deckId === id);
    return dc.length ? dc.reduce((s, cd) => s + (cd.ease ?? 2.5), 0) / dc.length : 2.5;
  };

  function toggleTheme() { const n = themeMode === "light" ? "dark" : "light"; setThemeMode(n); persist({ ...data, theme: n }); }
  function toggleLang() { const n = lang === "ja" ? "en" : "ja"; setLang(n); persist({ ...data, lang: n }); }
  function navigate(next) { setView(next); if (isMobile) setSidebarOpen(false); }

  function createDeck(name, description) {
    const deck = { id: uid(), name: name.trim(), description: description.trim(), createdAt: todayISO() };
    persist({ ...data, decks: [...decks, deck] }); setModal(null); showToast(t.toastDeckCreated(deck.name));
  }
  function deleteDeck(deckId) {
    persist({ ...data, decks: decks.filter((d) => d.id !== deckId), cards: cards.filter((cd) => cd.deckId !== deckId) });
    setView({ kind: "decks" }); showToast(t.toastDeckDeleted);
  }
  function createCard(deckId, front, back) {
    const card = { id: uid(), deckId, front: front.trim(), back: back.trim(), ease: 2.5, interval: 0, reps: 0, lapses: 0, dueDate: todayISO(), createdAt: todayISO(), lastReviewed: null };
    persist({ ...data, cards: [...cards, card] }); setModal(null); showToast(t.toastCardAdded);
  }
  function createCardsBulk(deckId, list) {
    const newCards = list.map((it) => ({ id: uid(), deckId, front: it.front.trim(), back: it.back.trim(), ease: 2.5, interval: 0, reps: 0, lapses: 0, dueDate: todayISO(), createdAt: todayISO(), lastReviewed: null }));
    persist({ ...data, cards: [...cards, ...newCards] }); setModal(null); showToast(t.toastCardsAdded(newCards.length));
  }
  function updateCard(cardId, front, back) {
    persist({ ...data, cards: cards.map((cd) => cd.id === cardId ? { ...cd, front: front.trim(), back: back.trim() } : cd) });
    setModal(null); showToast(t.toastCardUpdated);
  }
  function deleteCard(cardId) { persist({ ...data, cards: cards.filter((cd) => cd.id !== cardId) }); showToast(t.toastCardDeleted); }
  function gradeCard(cardId, quality) {
    const card = cards.find((cd) => cd.id === cardId); if (!card) return;
    const updated = sm2(card, quality);
    const log = [...data.reviewLog, { date: todayISO(), quality }].slice(-2000);
    persist({ ...data, cards: cards.map((cd) => cd.id === cardId ? { ...cd, ...updated } : cd), reviewLog: log });
  }

  async function sendAiMessage(userText) {
    const history = [...(data.aiChat || []), { role: "user", content: userText }];
    persist({ ...data, aiChat: history.slice(-40) });
    if (!apiKey) {
      persist({ ...data, aiChat: [...history, { role: "assistant", content: t.aiNoKey }].slice(-40) });
      return;
    }
    try {
      const summary = decks.map((d) => `${d.name}(${t.dueBadge(dueCountForDeck(d.id))}, ${t.cardCount(cards.filter((cd) => cd.deckId === d.id).length)})`).join(", ") || (lang === "ja" ? "まだデッキがありません" : "no decks yet");
      const system = lang === "ja"
        ? `あなたはMemoraという間隔反復学習アプリに組み込まれたAI学習アシスタントです。親しみやすく簡潔な日本語で答えてください。ユーザーの現在のデッキ状況: ${summary}`
        : `You are the AI study assistant built into Memora, a spaced-repetition app. Answer concisely in English. User's current decks: ${summary}`;
      const reply = await askClaude(apiKey, history.map((m) => ({ role: m.role, content: m.content })), system);
      persist({ ...data, aiChat: [...history, { role: "assistant", content: reply }].slice(-40) });
    } catch (err) {
      console.error("sendAiMessage failed", err);
      persist({ ...data, aiChat: [...history, { role: "assistant", content: t.aiError }].slice(-40) });
    }
  }

  async function generateSuggestions(topic, count, onDone) {
    if (!apiKey) { onDone([], t.aiNoKey); return; }
    try {
      const langInstruction = lang === "ja" ? "日本語で" : "in English";
      const system = `You generate flashcards for a spaced-repetition app. Respond with ONLY a raw JSON array (no markdown fences, no commentary) of exactly ${count} objects, each with a "front" and "back" string field, written ${langInstruction}, about the given topic. Keep each field under 20 words.`;
      const reply = await askClaude(apiKey, [{ role: "user", content: `Topic: ${topic}` }], system);
      const cleaned = reply.replace(/```json|```/g, "").trim();
      const match = cleaned.match(/\[[\s\S]*\]/);
      const list = JSON.parse(match ? match[0] : cleaned);
      const filtered = Array.isArray(list) ? list.filter((x) => x && x.front && x.back) : [];
      if (!filtered.length) throw new Error("no_valid_cards");
      onDone(filtered, null);
    } catch (err) {
      console.error("generateSuggestions failed", err);
      onDone([], t.suggestError);
    }
  }

  async function generateSuggestionsFromImage(base64Data, mediaType, count, onDone) {
    if (!apiKey) { onDone([], t.aiNoKey); return; }
    try {
      const langInstruction = lang === "ja" ? "日本語で" : "in English";
      const system = `You look at an image of study material (a textbook page, notes, a diagram, etc.) and generate flashcards for a spaced-repetition app based on its content. Respond with ONLY a raw JSON array (no markdown fences, no commentary) of up to ${count} objects, each with a "front" and "back" string field, written ${langInstruction}. Keep each field under 25 words. Base the cards only on what is actually visible in the image.`;
      const messages = [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mediaType, data: base64Data } },
          { type: "text", text: langInstruction === "日本語で" ? "この画像の内容からカードを作ってください。" : "Create flashcards from the content of this image." },
        ],
      }];
      const reply = await askClaude(apiKey, messages, system);
      const cleaned = reply.replace(/```json|```/g, "").trim();
      const match = cleaned.match(/\[[\s\S]*\]/);
      const list = JSON.parse(match ? match[0] : cleaned);
      const filtered = Array.isArray(list) ? list.filter((x) => x && x.front && x.back) : [];
      if (!filtered.length) throw new Error("no_valid_cards");
      onDone(filtered, null);
    } catch (err) {
      console.error("generateSuggestionsFromImage failed", err);
      onDone([], t.suggestError);
    }
  }

  return (
    <div style={{ fontFamily: "'Inter', sans-serif", background: c.bg, color: c.ink, minHeight: "100vh", display: "flex" }}>
      <style>{`
        @media (max-width: 768px) {
          .memora-main { padding-top: calc(56px + env(safe-area-inset-top)) !important; }
          .memora-content { padding: 20px !important; }
        }
      `}</style>

      {isMobile && sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", zIndex: 55 }} />}
      {isMobile && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: "calc(56px + env(safe-area-inset-top))", background: c.bgElevated, borderBottom: `1px solid ${c.border}`, display: "flex", alignItems: "center", gap: 12, padding: "env(safe-area-inset-top) 14px 0", boxSizing: "border-box", zIndex: 50 }}>
          <button className="memora-btn" onClick={() => setSidebarOpen(true)} style={{ background: "transparent", fontSize: 20, padding: 4 }}>☰</button>
          <span className="memora-display" style={{ fontSize: 17, fontWeight: 600, color: c.ink }}>Memora</span>
        </div>
      )}

      <Sidebar c={c} t={t} decks={decks} view={view} setView={navigate} themeMode={themeMode} toggleTheme={toggleTheme}
        lang={lang} toggleLang={toggleLang} onNewDeck={() => setModal({ type: "newDeck" })}
        dueCountForDeck={dueCountForDeck} avgEaseForDeck={avgEaseForDeck} isMobile={isMobile} sidebarOpen={sidebarOpen}
        collapsed={!isMobile && desktopCollapsed} onToggleCollapse={() => setDesktopCollapsed((v) => !v)}
        onOpenSettings={() => setModal({ type: "settings" })}
        onCloseMobile={() => setSidebarOpen(false)}
      />

      <main className="memora-main" style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <div className="memora-content" style={{ display: "flex", flexDirection: "column", flex: 1 }}>
          {view.kind === "decks" && (
            <DecksHome c={c} t={t} decks={decks} cards={cards} dueCountForDeck={dueCountForDeck} avgEaseForDeck={avgEaseForDeck}
              onOpenDeck={(id) => navigate({ kind: "deck", deckId: id })} onNewDeck={() => setModal({ type: "newDeck" })} />
          )}
          {view.kind === "deck" && (
            <DeckDetail c={c} t={t} deck={decks.find((d) => d.id === view.deckId)} cards={cards.filter((cd) => cd.deckId === view.deckId)}
              onBack={() => navigate({ kind: "decks" })} onStudy={() => navigate({ kind: "study", deckId: view.deckId })}
              onNewCard={() => setModal({ type: "newCard", deckId: view.deckId })}
              onSuggestCards={() => setModal({ type: "aiSuggest", deckId: view.deckId, loading: false, suggestions: null, error: null })}
              onSuggestImageCards={() => setModal({ type: "aiImageSuggest", deckId: view.deckId, loading: false, suggestions: null, error: null })}
              onEditCard={(card) => setModal({ type: "editCard", card })} onDeleteCard={deleteCard}
              onDeleteDeck={() => setModal({ type: "confirmDeleteDeck", deckId: view.deckId })} />
          )}
          {view.kind === "study" && (() => {
            const deckCards = cards.filter((cd) => cd.deckId === view.deckId);
            const dueCards = deckCards.filter(isDue);
            const initialQueue = dueCards.length > 0 ? dueCards : shuffleArray(deckCards);
            return (
              <StudySession c={c} t={t} deck={decks.find((d) => d.id === view.deckId)}
                queue={initialQueue} allCards={deckCards} onGrade={gradeCard}
                onExit={() => navigate({ kind: "deck", deckId: view.deckId })} />
            );
          })()}
          {view.kind === "stats" && <StatsView c={c} t={t} data={data} cards={cards} />}
        </div>
      </main>

      <button className="memora-btn" onClick={() => setAiOpen(true)} title={t.aiConsult} style={{
        position: "fixed", bottom: 22, right: 22, width: 54, height: 54, borderRadius: "50%",
        background: `linear-gradient(145deg, ${c.gold}, ${c.teal})`, color: "#fff", fontSize: 22,
        display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 10px 26px rgba(0,0,0,.25)", zIndex: 45,
      }}>✨</button>

      {aiOpen && <AiPanel c={c} t={t} messages={data.aiChat || []} onSend={sendAiMessage} onClose={() => setAiOpen(false)} hasKey={!!apiKey} />}

      {modal?.type === "newDeck" && <DeckFormModal c={c} t={t} onCancel={() => setModal(null)} onSubmit={(n, d) => n.trim() && createDeck(n, d)} />}
      {modal?.type === "newCard" && <CardFormModal c={c} t={t} title={t.modalNewCardTitle} onCancel={() => setModal(null)} onSubmit={(f, b) => f.trim() && b.trim() && createCard(modal.deckId, f, b)} />}
      {modal?.type === "editCard" && <CardFormModal c={c} t={t} title={t.modalEditCardTitle} initialFront={modal.card.front} initialBack={modal.card.back} onCancel={() => setModal(null)} onSubmit={(f, b) => f.trim() && b.trim() && updateCard(modal.card.id, f, b)} />}
      {modal?.type === "confirmDeleteDeck" && <ConfirmModal c={c} title={t.confirmDeleteDeckTitle} body={t.confirmDeleteDeckBody} confirmLabel={t.confirmDeleteDeckBtn} cancelLabel={t.cancel} onCancel={() => setModal(null)} onConfirm={() => { deleteDeck(modal.deckId); setModal(null); }} />}
      {modal?.type === "aiSuggest" && (
        <AiSuggestModal c={c} t={t} onCancel={() => setModal(null)}
          onGenerate={(topic, count) => { setModal((m) => ({ ...m, loading: true, error: null })); generateSuggestions(topic, count, (list, err) => setModal((m) => ({ ...m, loading: false, suggestions: list, error: err }))); }}
          state={modal} onAddSelected={(sel) => createCardsBulk(modal.deckId, sel)} />
      )}
      {modal?.type === "aiImageSuggest" && (
        <AiImageSuggestModal c={c} t={t} onCancel={() => setModal(null)}
          onGenerate={(base64Data, mediaType, count) => { setModal((m) => ({ ...m, loading: true, error: null })); generateSuggestionsFromImage(base64Data, mediaType, count, (list, err) => setModal((m) => ({ ...m, loading: false, suggestions: list, error: err }))); }}
          state={modal} onAddSelected={(sel) => createCardsBulk(modal.deckId, sel)} />
      )}
      {modal?.type === "settings" && (
        <SettingsModal c={c} t={t} initialKey={apiKey} onCancel={() => setModal(null)}
          onSave={(key) => { setApiKey(key); saveApiKey(key); setModal(null); showToast(t.toastKeySaved); }} />
      )}

      {toast && <div className="memora-fade" style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: c.ink, color: c.bg, padding: "10px 18px", borderRadius: 10, fontSize: 14, boxShadow: "0 8px 24px rgba(0,0,0,.25)", zIndex: 70 }}>{toast}</div>}
    </div>
  );
}

        <button className="memora-btn" onClick={onSuggestImageCards} style={{ background: "transparent", color: c.teal, border: `1px solid ${c.teal}`, borderRadius: 10, padding: "11px 18px", fontWeight: 600, fontSize: 14 }}>🖼️ {t.aiImageSuggestCards}</button>

              <button className="memora-btn" onClick={() => onEditCard(cd)} style={{ background: "transparent", color: c.inkFaint, padding: 4 }}>✎</button>

        </div>

}

function StudySession({ c, t, deck, queue: initialQueue, allCards, onGrade, onExit }) {
  const [queue, setQueue] = useState(initialQueue.map((cd) => cd.id));
  const [revealed, setRevealed] = useState(false);
  const [doneCount, setDoneCount] = useState(0);
  const lookup = allCards || initialQueue;
  const currentId = queue[0];
  const current = lookup.find((cd) => cd.id === currentId);
  const G = grades(t);

  const handleGrade = useCallback((q) => { if (!currentId) return; onGrade(currentId, q); setDoneCount((n) => n + 1); setQueue((qq) => qq.slice(1)); setRevealed(false); }, [currentId, onGrade]);
  const restartPractice = useCallback(() => {
    setQueue(shuffleArray(allCards || initialQueue).map((cd) => cd.id));
    setDoneCount(0); setRevealed(false);
  }, [allCards, initialQueue]);

  useEffect(() => {
    function onKey(e) {
      if (!current) return;
      if (e.key === " " && !revealed) { e.preventDefault(); setRevealed(true); return; }
      if (revealed) { const g = G.find((g) => g.key === e.key); if (g) handleGrade(g.quality); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [revealed, current, handleGrade]);

  if (!deck) return null;
  if (!current) {
    return (
      <div className="memora-fade" style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, padding: 40 }}>
        <div style={{ fontSize: 32 }}>✓</div>
        <div className="memora-display" style={{ fontSize: 24, fontWeight: 600 }}>{t.allCaughtUp}</div>
        <div style={{ color: c.inkSoft, fontSize: 14 }}>{t.reviewedSummary(doneCount, deck.name)}</div>
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          {(allCards?.length ?? 0) > 0 && (
            <button className="memora-btn" onClick={restartPractice} style={{ background: "transparent", color: c.teal, border: `1.5px solid ${c.teal}`, borderRadius: 10, padding: "10px 20px", fontWeight: 600, fontSize: 14 }}>{t.studyAgainInSession}</button>
          )}
          <button className="memora-btn" onClick={onExit} style={{ background: c.teal, color: "#fff", borderRadius: 10, padding: "10px 20px", fontWeight: 600, fontSize: 14 }}>{t.backToDeck}</button>
        </div>
      </div>
    );
  }
  const progress = Math.round((doneCount / (doneCount + queue.length)) * 100);
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "32px 24px 40px" }}>
      <div style={{ width: "100%", maxWidth: 640, display: "flex", alignItems: "center", gap: 12, marginBottom: 30 }}>
        <button className="memora-btn" onClick={onExit} style={{ background: "transparent", color: c.inkSoft, padding: 4, fontSize: 18 }}>✕</button>
        <div style={{ flex: 1, height: 6, background: c.bgSunken, borderRadius: 4, overflow: "hidden" }}><div style={{ height: "100%", width: `${progress}%`, background: c.teal, transition: "width .3s ease" }} /></div>
        <span className="memora-mono" style={{ fontSize: 12, color: c.inkFaint, minWidth: 50, textAlign: "right" }}>{t.leftCount(queue.length)}</span>
      </div>
      <div key={current.id} className="memora-flip" style={{ width: "100%", maxWidth: 640, minHeight: 280, background: c.bgElevated, border: `1px solid ${c.border}`, borderRadius: 20, padding: "40px 36px", display: "flex", flexDirection: "column", justifyContent: "center", gap: 20, boxShadow: "0 12px 32px rgba(0,0,0,.08)" }}>
        <div style={{ fontSize: 12, color: c.inkFaint, textTransform: "uppercase", letterSpacing: "0.06em" }}>{deck.name}</div>
        <div className="memora-display" style={{ fontSize: 24, fontWeight: 500, lineHeight: 1.4 }}>{current.front}</div>
        {revealed && <div className="memora-fade" style={{ borderTop: `1px solid ${c.border}`, paddingTop: 20, fontSize: 18, color: c.inkSoft, lineHeight: 1.5 }}>{current.back}</div>}
      </div>
      <div style={{ width: "100%", maxWidth: 640, marginTop: 24 }}>
        {!revealed ? (
          <button className="memora-btn" onClick={() => setRevealed(true)} style={{ width: "100%", background: c.ink, color: c.bg, borderRadius: 12, padding: "14px", fontWeight: 600, fontSize: 15 }}>{t.showAnswer} <span className="memora-mono" style={{ opacity: .6, fontSize: 12 }}>(space)</span></button>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
            {G.map((g, i) => { const colors = [c.danger, c.gold, c.teal, c.teal]; return (
              <button key={g.quality} className="memora-btn" onClick={() => handleGrade(g.quality)} style={{ background: "transparent", border: `1.5px solid ${colors[i]}`, color: colors[i], borderRadius: 12, padding: "12px 4px", fontWeight: 600, fontSize: 13, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                {g.label}<span className="memora-mono" style={{ fontSize: 10, opacity: .65 }}>{g.key}</span>
              </button>
            );})}
          </div>
        )}
      </div>
    </div>
  );
}

function StatsView({ c, t, data, cards }) {
  const chartData = useMemo(() => {
    const days = []; for (let i = 13; i >= 0; i--) days.push(addDays(todayISO(), -i));
    return days.map((day) => ({ label: day.slice(5), value: data.reviewLog.filter((r) => r.date === day).length }));
  }, [data.reviewLog]);
  const totalReviews = data.reviewLog.length;
  const overallRetention = totalReviews ? Math.round((data.reviewLog.filter((r) => r.quality >= 3).length / totalReviews) * 100) : 0;
  const newCards = cards.filter((cd) => cd.reps === 0).length;
  const matureCards = cards.filter((cd) => cd.reps >= 2).length;
  const streak = useMemo(() => { let s = 0; for (let i = 0; i < 365; i++) { const day = addDays(todayISO(), -i); if (data.reviewLog.some((r) => r.date === day)) s++; else break; } return s; }, [data.reviewLog]);
  return (
    <div className="memora-fade" style={{ padding: "40px 48px", maxWidth: 980, width: "100%" }}>
      <h1 className="memora-display" style={{ fontSize: 30, fontWeight: 600, marginBottom: 28 }}>{t.yourProgress}</h1>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px,1fr))", gap: 14, marginBottom: 32 }}>
        <StatCard c={c} icon="🔥" label={t.dayStreak} value={streak} />
        <StatCard c={c} icon="⏱️" label={t.totalReviews} value={totalReviews} />
        <StatCard c={c} icon="✓" label={t.retention} value={`${overallRetention}%`} />
        <StatCard c={c} icon="📖" label={t.newMatureCards} value={`${newCards} / ${matureCards}`} />
      </div>
      <div style={{ background: c.bgElevated, border: `1px solid ${c.border}`, borderRadius: 16, padding: "22px 20px" }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>{t.reviewsChartTitle}</div>
        {totalReviews === 0 ? <div style={{ color: c.inkFaint, fontSize: 13, padding: "40px 0", textAlign: "center" }}>{t.reviewFirstCardMsg}</div> : <SimpleBarChart c={c} data={chartData} />}
      </div>
    </div>
  );
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = () => reject(new Error("read_failed"));
    reader.readAsDataURL(file);
  });
}

function AiImageSuggestModal({ c, t, onCancel, onGenerate, state, onAddSelected }) {
  const [previewUrl, setPreviewUrl] = useState(null);
  const [imageData, setImageData] = useState(null);
  const [count, setCount] = useState(8);
  const [localError, setLocalError] = useState(null);
  const [selected, setSelected] = useState(null);
  const fileInputRef = useRef(null);

  useEffect(() => { if (state.suggestions) setSelected(state.suggestions.map(() => true)); }, [state.suggestions]);

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setLocalError(null);
    try {
      const base64 = await fileToBase64(file);
      setImageData({ base64, mediaType: file.type || "image/jpeg" });
      setPreviewUrl(URL.createObjectURL(file));
    } catch { setLocalError(t.noImageError); }
  }

  const selectedList = state.suggestions ? state.suggestions.filter((_, i) => selected?.[i]) : [];

  return (
    <ModalShell c={c} title={t.aiImageSuggestModalTitle} onCancel={onCancel} wide>
      {!state.suggestions && !state.loading && (
        <>
          <div style={{ fontSize: 12.5, color: c.inkFaint, lineHeight: 1.5, marginBottom: 14 }}>{t.imageHelp}</div>
          <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
          {previewUrl ? (
            <div style={{ marginBottom: 16 }}>
              <img src={previewUrl} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "contain", borderRadius: 10, border: `1px solid ${c.border}`, background: c.bgSunken }} />
              <button className="memora-btn" onClick={() => fileInputRef.current?.click()} style={{ marginTop: 8, background: "transparent", color: c.teal, border: `1px solid ${c.teal}`, borderRadius: 9, padding: "8px 14px", fontSize: 13, fontWeight: 600 }}>🖼️ {t.changeImage}</button>
            </div>
          ) : (
            <button className="memora-btn" onClick={() => fileInputRef.current?.click()} style={{ width: "100%", border: `1.5px dashed ${c.border}`, borderRadius: 12, padding: "28px 16px", background: "transparent", color: c.inkSoft, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, marginBottom: 16 }}>
              <span style={{ fontSize: 22 }}>🖼️</span>
              <span style={{ fontSize: 13.5, fontWeight: 600 }}>{t.chooseImage}</span>
            </button>
          )}
          <label style={{ fontSize: 12, color: c.inkSoft, fontWeight: 600 }}>{t.countLabel}</label>
          <input className="memora-input" type="number" min={1} max={20} value={count} onChange={(e) => setCount(Math.max(1, Math.min(20, Number(e.target.value) || 1)))} style={inputStyle(c)} />
          {(localError || state.error) && <div style={{ color: c.danger, fontSize: 13, marginBottom: 12 }}>{localError || state.error}</div>}
          <ModalActions c={c} cancelLabel={t.cancel} onCancel={onCancel}
            onConfirm={() => imageData ? onGenerate(imageData.base64, imageData.mediaType, count) : setLocalError(t.noImageError)}
            confirmLabel={t.generateBtn} disabled={!imageData} />
        </>
      )}
      {state.loading && <div style={{ padding: "30px 0", textAlign: "center", color: c.inkSoft, fontSize: 14 }}>{t.suggestLoading}</div>}
      {state.suggestions && !state.loading && (
        <>
          <div className="memora-scroll" style={{ maxHeight: 320, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
            {state.suggestions.map((s, i) => (
              <label key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", background: c.bgSunken, borderRadius: 10, padding: "10px 12px", cursor: "pointer" }}>
                <input type="checkbox" checked={!!selected?.[i]} onChange={(e) => setSelected((sel) => sel.map((v, j) => j === i ? e.target.checked : v))} style={{ marginTop: 3 }} />
                <div style={{ fontSize: 13 }}><div style={{ fontWeight: 600 }}>{s.front}</div><div style={{ color: c.inkSoft }}>{s.back}</div></div>
              </label>
            ))}
          </div>
          <ModalActions c={c} cancelLabel={t.cancel} onCancel={onCancel} onConfirm={() => onAddSelected(selectedList)} confirmLabel={t.addSelectedBtn(selectedList.length)} disabled={selectedList.length === 0} />
        </>
      )}
    </ModalShell>
  );
}

<script>
(function () {
  function showError(title, detail) {
    var el = document.getElementById("root");
    el.innerHTML =
      '<div style="min-height:100vh;background:#14152A;color:#EDEBF7;font-family:sans-serif;padding:28px;box-sizing:border-box;">' +
        '<h2 style="margin:0 0 12px;">' + title + '</h2>' +
        '<pre style="white-space:pre-wrap;word-break:break-word;background:#1C1E3A;padding:16px;border-radius:10px;font-size:13px;color:#E08277;line-height:1.5;">' +
          String(detail).replace(/</g, "&lt;") +
        '</pre>' +
        '<p style="color:#A6A4C6;font-size:13px;">このメッセージのスクリーンショットを送ってもらえれば原因を確認できます。</p>' +
      '</div>';
  }

  window.addEventListener("error", function (e) {
    if (document.getElementById("root") && !document.getElementById("root").hasChildNodes()) {
      showError("読み込み中にエラーが発生しました", e.message + "\n" + (e.filename || "") + ":" + (e.lineno || ""));
    }
  });

  try {
    if (typeof Babel === "undefined") {
      showError("Babelの読み込みに失敗しました", "ネットワークがunpkg.comへのアクセスをブロックしている可能性があります。Wi-Fiを切ってモバイル回線で試すか、別のネットワークで試してください。");
      return;
    }
    var source = document.getElementById("app-source").textContent;
    var transformed = Babel.transform(source, { presets: ["react"] }).code;
    var script = document.createElement("script");
    script.text = transformed;
    document.body.appendChild(script);
  } catch (err) {
    showError("アプリのコードでエラーが発生しました (Babel変換エラー)", (err && err.message) || err);
  }
})();
</script>
</body>
</html>
